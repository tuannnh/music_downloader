services:
  universal-downloader:
    # Pull the published image, or swap for `build:` below to build locally.
    image: ghcr.io/tuannnh/universal_downloader:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile.universal
    container_name: universal_downloader
    restart: unless-stopped
    ports:
      - "8081:8081"
    # Real values live in .env (gitignored). Use copytele's DIRECT origin
    # (LAN IP:port), NOT the public Cloudflare URL — Cloudflare 524-times-out /
    # caps large uploads. Base ends in source/ → files land in
    # source/<platform>/<videos|photos>/.
    environment:
      COPYTELE_UPLOAD_URL: "${COPYTELE_UPLOAD_URL:-http://copytele:3923/source/}"
      COPYTELE_PW: "${COPYTELE_PW:-}"
      OVERWRITE: "${OVERWRITE:-false}"
      COOKIES_DIR: "/cookies"
      # TikTok works anonymously. Instagram & Facebook need a logged-in session
      # cookie even for PUBLIC profiles. Easiest: base64 a cookies.txt
      # (`base64 -w0 cookies.txt`) and store it in Infisical, injected here:
      INSTAGRAM_COOKIES_B64: "${INSTAGRAM_COOKIES_B64:-}"
      FACEBOOK_COOKIES_B64: "${FACEBOOK_COOKIES_B64:-}"
      TIKTOK_COOKIES_B64: "${TIKTOK_COOKIES_B64:-}"
    # Alternative to the *_B64 env vars: mount cookies files (instagram.txt,
    # facebook.txt, tiktok.txt) and rely on COOKIES_DIR=/cookies.
    # volumes:
    #   - ./cookies:/cookies:ro
    # Point nginx-proxy-manager at this container on port 8081.
